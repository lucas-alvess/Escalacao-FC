<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"/>
  <meta name="theme-color" content="#050c0a"/>
  <meta name="mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <title>Escalação FC</title>

  <!-- Fontes -->
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;700;900&family=Anton&family=Oswald:wght@400;700&family=Teko:wght@400;700&family=Russo+One&family=Archivo+Black&family=Squada+One&family=Black+Ops+One&family=Orbitron:wght@400;700&family=Staatliches&family=Bungee&display=swap" rel="stylesheet"/>
  <link rel="icon" type="image/png" href="/assets/images/icon-192.png"/>
  <link rel="apple-touch-icon" href="/assets/images/apple-touch-icon.png"/>

  <!-- Estilos -->
  <link rel="manifest" href="/manifest.json"/>
  <link rel="stylesheet" href="assets/css/styles.css"/>
</head>
<body>
  <div id="loading">
    <div class="spin"></div>
    <div class="load-text">CARREGANDO...</div>
  </div>
  <div id="root"></div>

  <!-- Capacitor (bridge nativa — só ativa dentro do APK) -->
  <script src="capacitor.js"></script>

  <!-- React -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://cdn.jsdelivr.net/npm/@babel/standalone@7.23.10/babel.min.js" crossorigin onerror="this.onerror=null;document.write('<script src=https://unpkg.com/@babel/standalone@7.23.10/babel.min.js><\/script>')"></script>

  <!-- Firebase -->
  <script type="module" src="firebase/config.js"></script>

  <!-- App -->
  <script type="text/babel" data-presets="react" src="assets/js/app.js"></script>

  <!-- Bloqueia pinch-to-zoom via JS (reforço ao meta viewport) -->
  <script>
    document.addEventListener('touchmove', function(e) {
      if (e.touches.length > 1) e.preventDefault();
    }, { passive: false });
    document.addEventListener('gesturestart', function(e) {
      e.preventDefault();
    }, { passive: false });
  </script>

  <!-- Service Worker -->
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', function() {
        navigator.serviceWorker.register('/sw.js')
          .catch(function(err) { console.warn('SW registration failed:', err); });
      });
    }
  </script>
</body>
</html>
