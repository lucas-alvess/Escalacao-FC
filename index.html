<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"/>
  <meta name="theme-color" content="#050c0a"/>
  <meta name="mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <title>Escalação FC</title>

  <!-- Fontes -->
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;700;900&family=Anton&family=Oswald:wght@400;700&family=Teko:wght@400;700&family=Russo+One&family=Archivo+Black&family=Squada+One&family=Black+Ops+One&family=Orbitron:wght@400;700&family=Staatliches&family=Bungee&display=swap" rel="stylesheet"/>
  <link rel="icon" type="image/png" href="/assets/images/icon-192.png"/>
  <link rel="apple-touch-icon" href="/assets/images/apple-touch-icon.png"/>

  <!-- Estilos -->
  <link rel="manifest" href="/manifest.json"/>
  <link rel="stylesheet" href="/assets/css/styles.css"/>
</head>
<body>
  <div id="loading">
    <div class="spin"></div>
    <div class="load-text">CARREGANDO...</div>
  </div>
  <div id="root"></div>

  <!-- Capacitor (bridge nativa — só ativa dentro do APK) -->
  <script src="/capacitor.js"></script>

  <!-- Bloqueia pinch-to-zoom via JS (reforço ao meta viewport) -->
  <script>
    document.addEventListener('touchmove', function(e) {
      if (e.touches.length > 1) e.preventDefault();
    }, { passive: false });
    document.addEventListener('gesturestart', function(e) {
      e.preventDefault();
    }, { passive: false });
  </script>

  <!-- Service Worker -->
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', function() {
        navigator.serviceWorker.register('/sw.js')
          .catch(function(err) { console.warn('SW registration failed:', err); });
      });
    }
  </script>

  <!-- Monitor de erros global -->
  <script>
    function _reportError(message, source, extra) {
      try {
        var fb = window.__firebaseForErrors;
        if (!fb) return;
        var uid = fb.auth && fb.auth.currentUser ? fb.auth.currentUser.uid : null;
        var entry = {
          message: String(message).slice(0, 500),
          source: String(source || '').slice(0, 200),
          extra: String(extra || '').slice(0, 300),
          uid: uid || 'anonymous',
          appVersion: 'v1',
          userAgent: navigator.userAgent.slice(0, 200),
          url: location.pathname,
          ts: new Date().toISOString()
        };
        fb.setDoc(fb.doc(fb.db, 'app_errors', Date.now() + '_' + Math.random().toString(36).slice(2, 7)), entry).catch(function(){});
      } catch(e) {}
    }

    window.onerror = function(message, source, lineno, colno, error) {
      _reportError(message, source + ':' + lineno, error ? error.stack : '');
    };

    window.addEventListener('unhandledrejection', function(e) {
      var reason = e.reason;
      var msg = reason instanceof Error ? reason.message : String(reason);
      var stack = reason instanceof Error ? reason.stack : '';
      _reportError('UnhandledRejection: ' + msg, 'promise', stack);
    });
  </script>

  <!-- Ponto de entrada do app (Vite injeta o bundle aqui) -->
  <script type="module" src="/src/main.jsx"></script>
</body>
</html>
